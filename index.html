<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Ativos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 
    
    <script>
        if (localStorage.getItem("token_inventario") !== "chave_mestra_secreta") {
            window.location.href = "/login"; // Expulsa para o login se não tiver o token
        }
    </script>
</head>
<body class="bg-light">

    <div class="container py-5 px-4">
        
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 text-center">
            <h2 class="text-primary mb-3 mb-md-0">Inventário de Equipamentos</h2>
            <div>
                <button id="btnLogs" class="btn btn-outline-warning me-2 mb-2 mb-md-0" onclick="carregarLogs()" data-bs-toggle="modal" data-bs-target="#modalLogs">📜 Histórico (Logs)</button>
                <button class="btn btn-outline-danger mb-2 mb-md-0" onclick="fazerLogout()">Sair do Sistema</button>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-4 mb-3 mb-md-0">
                <div class="card text-white bg-primary h-100">
                    <div class="card-body text-center d-flex flex-column justify-content-center">
                        <h5 class="card-title">Total de Ativos</h5>
                        <h1 class="display-4" id="totalAtivos">0</h1>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3 mb-md-0">
                <div class="card h-100">
                    <div class="card-body">
                        <h6 class="card-title text-center">Por Status</h6>
                        <div style="height: 200px;">
                            <canvas id="graficoStatus"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h6 class="card-title text-center">Por Categoria</h6>
                        <div style="height: 200px;">
                            <canvas id="graficoCategoria"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-9 mb-2 mb-md-0">
                <input type="text" id="campoBusca" class="form-control" placeholder="🔍 Buscar equipamento por nome, fabricante ou categoria...">
            </div>
            <div class="col-md-3">
                <a href="/exportar-csv/" class="btn btn-outline-success w-100">📥 Exportar Planilha</a>
            </div>
        </div>
        
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h5 class="card-title">Cadastrar Novo Ativo</h5>
                <form id="formAtivo" class="row g-3">
                    <div class="col-md-2">
                        <input type="text" id="nome" class="form-control" placeholder="Nome/Modelo" required>
                    </div>
                    <div class="col-md-2">
                        <input type="text" id="categoria" class="form-control" placeholder="Categoria" required>
                    </div>
                    <div class="col-md-2">
                        <input type="text" id="fabricante" class="form-control" placeholder="Fabricante" required>
                    </div>
                    <div class="col-md-2">
                        <select id="status" class="form-select">
                            <option value="Ativo">Ativo</option>
                            <option value="Guardado">Guardado</option>
                            <option value="Em Manutenção">Manutenção</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="file" id="imagem" class="form-control" accept="image/*">
                    </div>
                    <div class="col-md-1">
                        <button type="submit" class="btn btn-success w-100">+</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body px-3">
                <div class="table-responsive">
                    <table class="table table-striped align-middle" style="min-width: 800px;">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Foto</th>
                                <th>QR Code</th>
                                <th>Nome</th>
                                <th>Categoria</th>
                                <th>Fabricante</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaAtivos">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div> <div class="modal fade" id="modalLogs" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title">Caixa Preta: Histórico de Ações</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="table-responsive">
                        <table class="table table-sm table-striped">
                            <thead>
                                <tr>
                                    <th>Data e Hora</th>
                                    <th>Ação</th>
                                    <th>Detalhes</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaLogs">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="/static/index.js"></script>
    
    <script>
        function fazerLogout() {
            localStorage.removeItem("token_inventario"); // Apaga o crachá virtual da memória
            window.location.href = "/login"; // Joga de volta para a tela de bloqueio
        }
    </script>
</body>
</html>
