<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - Inventário PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #343a40 100%);
        }
        .card {
            border-radius: 12px;
            border: none;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card p-4 shadow-lg" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <h3 class="text-primary fw-bold">Inventário PRO</h3>
            <p class="text-muted">Acesso restrito à equipe de Infraestrutura</p>
        </div>

        <form id="formLogin">
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" id="usuario" class="form-control form-control-lg" required autocomplete="off">
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" id="senha" class="form-control form-control-lg" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Entrar no Sistema</button>
        </form>

        <div id="mensagemErro" class="alert alert-danger mt-3 d-none text-center" role="alert">
            ⚠️ Usuário ou senha incorretos!
        </div>
    </div>

    <script>
        // 🔒 Se já estiver logado, vai direto para o painel
        if (localStorage.getItem('token_inventario')) {
            window.location.href = '/';
        }

        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Limpa mensagem de erro ao digitar novamente
            document.getElementById('mensagemErro').classList.add('d-none');

            const usuarioDigitado = document.getElementById('usuario').value.trim();
            const senhaDigitada = document.getElementById('senha').value;

            try {
                const resposta = await fetch('/api/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: usuarioDigitado, senha: senhaDigitada })
                });

                if (resposta.ok) {
                    const dados = await resposta.json();
                    
                    // Salva credenciais e permissão
                    localStorage.setItem('token_inventario', dados.token);
                    localStorage.setItem('papel_inventario', dados.papel); // admin ou tecnico
                    
                    // Redireciona
                    window.location.href = '/';
                } else {
                    // Erro de login
                    document.getElementById('mensagemErro').classList.remove('d-none');
                }
            } catch (erro) {
                console.error("Erro de conexão:", erro);
                document.getElementById('mensagemErro').textContent = "❌ Erro de conexão com o servidor!";
                document.getElementById('mensagemErro').classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
